info:
  name: Ingest Documents
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/ingest"
  body:
    type: json
    data: |-
      {
        "docs_path": "data/docs",
        "overwrite": false,
        "pages_per_batch": 5,
        "start_page": 9,
        "end_page": 11
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
