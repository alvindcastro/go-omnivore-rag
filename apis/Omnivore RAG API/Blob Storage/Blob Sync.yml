info:
  name: Blob Sync
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/blob/sync"
  body:
    type: json
    data: |-
      {
        "overwrite": false,
        "ingest_after_sync": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
