info:
  name: Ingest
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/banner/ingest"
  body:
    type: json
    data: |-
      {
        "docs_path": "data/docs/banner/general/releases",
        "overwrite": false,
        "pages_per_batch": 10
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
