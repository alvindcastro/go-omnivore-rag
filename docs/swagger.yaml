          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize breaking changes in a Banner release
      tags:
      - banner
  /banner/summarize/changes:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize what changed in a Banner release
      tags:
      - banner
  /banner/summarize/compatibility:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
