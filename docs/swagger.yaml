basePath: /
definitions:
  adapter.AdapterResponse:
    properties:
      answer:
        type: string
      confidence:
        description: Confidence score from sources[0].score (0–1); 0.0 if no sources
          returned
        type: number
      escalate:
        description: true when confidence < 0.5 or retrieval_count == 0
        type: boolean
      sources:
        items:
          $ref: '#/definitions/adapter.AdapterSource'
        type: array
    type: object
  adapter.AdapterSource:
    properties:
      page:
        type: integer
      sop_number:
        type: string
      source_type:
        type: string
      title:
        type: string
    type: object
  api.bannerAskRequest:
    properties:
      module_filter:
        type: string
      question:
        minLength: 5
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
      year_filter:
        type: string
    required:
    - question
    type: object
  api.bannerIngestRequest:
    properties:
      docs_path:
        type: string
      end_page:
        type: integer
      overwrite:
        type: boolean
      pages_per_batch:
        type: integer
      start_page:
        type: integer
    type: object
  api.blobSyncRequest:
    properties:
      container_name:
        type: string
      ingest_after_sync:
        type: boolean
      overwrite:
        type: boolean
      pages_per_batch:
        type: integer
      prefix:
        type: string
    type: object
  api.moduleAskRequest:
    properties:
      mode:
        description: '"local" (default) | "web" | "hybrid" | "auto"'
        type: string
      question:
        minLength: 5
        type: string
      section_filter:
        type: string
      source_type:
        description: Optional — narrows to a specific doc type
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
      year_filter:
        type: string
    required:
    - question
    type: object
  api.chatAskRequest:
    properties:
      intent:
        description: 'Optional intent hint: RegistrationBanner | FinanceBanner | TranscriptSop
          | HoldsSop | ReleaseSummary | General'
        type: string
      message:
        type: string
      session_id:
        type: string
      source:
        description: 'Optional routing override: general | student | finance | sop
          | auto'
        enum:
        - general
        - student
        - finance
        - sop
        - auto
        type: string
    required:
    - message
    - session_id
    type: object
  api.intentResponse:
    properties:
      confidence:
        description: Normalized score 0–1
        type: number
      intent:
        description: One of RegistrationBanner | FinanceBanner | TranscriptSop | HoldsSop
          | ReleaseSummary | General
        type: string
    type: object
  api.messageRequest:
    properties:
      message:
        type: string
    required:
    - message
    type: object
  api.sentimentResponse:
    properties:
      score:
        description: Normalized score 0–1
        type: number
      sentiment:
        description: One of Positive | Neutral | Frustrated
        type: string
    type: object
  api.studentAskRequest:
    properties:
      mode:
        description: '"local" (default) | "web" | "hybrid" | "auto"'
        type: string
      module_filter:
        type: string
      question:
        minLength: 5
        type: string
      section_filter:
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
    required:
    - question
    type: object
  api.sopAskRequest:
    properties:
      question:
        minLength: 5
        type: string
      top_k:
        type: integer
    required:
    - question
    type: object
  api.sopIngestRequest:
    properties:
      overwrite:
        type: boolean
    type: object
  rag.AskResponse:
    properties:
      answer:
        type: string
      question:
        type: string
      retrieval_count:
        type: integer
      sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
    type: object
  rag.CrossReferenceRequest:
    properties:
      module_filter:
        type: string
      question:
        minLength: 5
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
    required:
    - question
    type: object
  rag.CrossReferenceResponse:
    properties:
      analysis:
        type: string
      guide_sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
      question:
        type: string
      release_sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
      retrieval_count:
        type: integer
    type: object
  rag.FullSummaryResponse:
    properties:
      action_items:
        type: string
      banner_module:
        type: string
      banner_version:
        type: string
      breaking_changes:
        type: string
      chunks_analyzed:
        type: integer
      compatibility:
        type: string
      filename:
        type: string
      source_pages:
        items:
          type: integer
        type: array
      what_changed:
        type: string
    type: object
  rag.LookupRequest:
    properties:
      module_filter:
        type: string
      section_filter:
        type: string
      term:
        minLength: 2
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
    required:
    - term
    type: object
  rag.LookupResponse:
    properties:
      definition:
        type: string
      retrieval_count:
        type: integer
      sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
      term:
        type: string
    type: object
  rag.ProcedureRequest:
    properties:
      module_filter:
        type: string
      section_filter:
        type: string
      topic:
        minLength: 5
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
    required:
    - topic
    type: object
  rag.ProcedureResponse:
    properties:
      procedure:
        type: string
      retrieval_count:
        type: integer
      sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
      topic:
        type: string
    type: object
  rag.SourceChunk:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      chunk_text:
        type: string
      document_title:
        type: string
      filename:
        type: string
      page:
        type: integer
      score:
        type: number
      sop_number:
        type: string
      source_type:
        type: string
      year:
        type: string
    type: object
  rag.SummarizeRequest:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      filename:
        type: string
      top_k:
        type: integer
      year_filter:
        type: string
    required:
    - filename
    type: object
  rag.SummarizeResponse:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      chunks_analyzed:
        type: integer
      filename:
        type: string
      source_pages:
        items:
          type: integer
        type: array
      summary:
        type: string
      topic:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: RAG pipeline over Banner release notes and Standard Operating Procedures
    (SOPs), backed by Azure OpenAI and Azure Cognitive Search.
  title: go-omnivore-rag API
  version: "1.0"
paths:
  /banner/ask:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.bannerAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against Banner release notes
      tags:
      - banner
  /banner/blob/list:
    get:
      parameters:
      - description: Blob name prefix filter
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List documents in Azure Blob Storage
      tags:
      - banner
  /banner/blob/sync:
    post:
      consumes:
      - application/json
      parameters:
      - description: Sync options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.blobSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download blobs from Azure Storage and ingest them
      tags:
      - banner
  /banner/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.bannerIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest Banner release note PDFs into the search index
      tags:
      - banner
  /banner/{module}/ask:
    post:
      consumes:
      - application/json
      description: Supported module values: finance, student, hr, financial-aid, ar,
        general
      parameters:
      - description: Banner module name
        in: path
        name: module
        required: true
        type: string
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.moduleAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question scoped to a specific Banner module
      tags:
      - banner
  /banner/student/ask:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.studentAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against Banner Student user guide
      tags:
      - student
  /banner/student/cross-reference:
    post:
      consumes:
      - application/json
      parameters:
      - description: Cross-reference request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.CrossReferenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.CrossReferenceResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Analyse how a Banner release change affects Student user guide procedures
      tags:
      - student
  /banner/student/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.bannerIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest Banner Student user guide PDFs into the search index
      tags:
      - student
  /banner/student/lookup:
    post:
      consumes:
      - application/json
      parameters:
      - description: Lookup request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.LookupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.LookupResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Look up a Banner Student concept or feature definition
      tags:
      - student
  /banner/student/procedure:
    post:
      consumes:
      - application/json
      parameters:
      - description: Procedure request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.ProcedureRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.ProcedureResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get step-by-step instructions for a Banner Student task
      tags:
      - student
  /banner/summarize/actions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
