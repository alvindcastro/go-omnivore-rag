          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against SOPs
      tags:
      - sop
  /sop/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.sopIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest SOP documents into the search index
      tags:
      - sop
swagger: "2.0"
