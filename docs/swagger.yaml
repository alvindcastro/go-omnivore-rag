basePath: /
host: localhost:8000
info:
  contact: {}
  description: RAG pipeline over Banner release notes and Standard Operating Procedures
    (SOPs), backed by Azure OpenAI and Azure Cognitive Search.
  title: go-omnivore-rag API
  version: "1.0"
paths:
  /debug/chunks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List up to 50 indexed document chunks
      tags:
      - system
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Service health check
      tags:
      - system
  /index/create:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create the Azure Search index
      tags:
      - system
  /index/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Azure Search index statistics
      tags:
      - system
  /sop:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all ingested SOPs
      tags:
      - sop
  /sop/ask:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.sopAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against SOPs
      tags:
      - sop
  /sop/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.sopIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest SOP documents into the search index
      tags:
      - sop
swagger: "2.0"
