basePath: /
definitions:
  api.bannerAskRequest:
    properties:
      module_filter:
        type: string
      question:
        minLength: 5
        type: string
      top_k:
        type: integer
      version_filter:
        type: string
      year_filter:
        type: string
    required:
    - question
    type: object
  api.bannerIngestRequest:
    properties:
      docs_path:
        type: string
      end_page:
        type: integer
      overwrite:
        type: boolean
      pages_per_batch:
        type: integer
      start_page:
        type: integer
    type: object
  api.blobSyncRequest:
    properties:
      container_name:
        type: string
      ingest_after_sync:
        type: boolean
      overwrite:
        type: boolean
      pages_per_batch:
        type: integer
      prefix:
        type: string
    type: object
  api.sopAskRequest:
    properties:
      question:
        minLength: 5
        type: string
      top_k:
        type: integer
    required:
    - question
    type: object
  api.sopIngestRequest:
    properties:
      overwrite:
        type: boolean
    type: object
  rag.AskResponse:
    properties:
      answer:
        type: string
      question:
        type: string
      retrieval_count:
        type: integer
      sources:
        items:
          $ref: '#/definitions/rag.SourceChunk'
        type: array
    type: object
  rag.FullSummaryResponse:
    properties:
      action_items:
        type: string
      banner_module:
        type: string
      banner_version:
        type: string
      breaking_changes:
        type: string
      chunks_analyzed:
        type: integer
      compatibility:
        type: string
      filename:
        type: string
      source_pages:
        items:
          type: integer
        type: array
      what_changed:
        type: string
    type: object
  rag.SourceChunk:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      chunk_text:
        type: string
      document_title:
        type: string
      filename:
        type: string
      page:
        type: integer
      score:
        type: number
      sop_number:
        type: string
      source_type:
        type: string
      year:
        type: string
    type: object
  rag.SummarizeRequest:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      filename:
        type: string
      top_k:
        type: integer
      year_filter:
        type: string
    required:
    - filename
    type: object
  rag.SummarizeResponse:
    properties:
      banner_module:
        type: string
      banner_version:
        type: string
      chunks_analyzed:
        type: integer
      filename:
        type: string
      source_pages:
        items:
          type: integer
        type: array
      summary:
        type: string
      topic:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: RAG pipeline over Banner release notes and Standard Operating Procedures
    (SOPs), backed by Azure OpenAI and Azure Cognitive Search.
  title: go-omnivore-rag API
  version: "1.0"
paths:
  /banner/ask:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.bannerAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against Banner release notes
      tags:
      - banner
  /banner/blob/list:
    get:
      parameters:
      - description: Blob name prefix filter
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List documents in Azure Blob Storage
      tags:
      - banner
  /banner/blob/sync:
    post:
      consumes:
      - application/json
      parameters:
      - description: Sync options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.blobSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download blobs from Azure Storage and ingest them
      tags:
      - banner
  /banner/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.bannerIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest Banner release note PDFs into the search index
      tags:
      - banner
  /banner/summarize/actions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize required actions for a Banner release
      tags:
      - banner
  /banner/summarize/breaking:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize breaking changes in a Banner release
      tags:
      - banner
  /banner/summarize/changes:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize what changed in a Banner release
      tags:
      - banner
  /banner/summarize/compatibility:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.SummarizeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Summarize compatibility notes for a Banner release
      tags:
      - banner
  /banner/summarize/full:
    post:
      consumes:
      - application/json
      parameters:
      - description: Summarize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/rag.SummarizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.FullSummaryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Full summary across all topics for a Banner release
      tags:
      - banner
  /debug/chunks:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List up to 50 indexed document chunks
      tags:
      - system
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Service health check
      tags:
      - system
  /index/create:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create the Azure Search index
      tags:
      - system
  /index/stats:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Azure Search index statistics
      tags:
      - system
  /sop:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all ingested SOPs
      tags:
      - sop
  /sop/ask:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.sopAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag.AskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ask a question against SOPs
      tags:
      - sop
  /sop/ingest:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingest options
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.sopIngestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest SOP documents into the search index
      tags:
      - sop
swagger: "2.0"
